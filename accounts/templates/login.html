{% extends 'base.html' %}
{% load static %}

{% block title %}Login - MeCare HMS{% endblock %}

{% block content %}
<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <!-- Image -->
        <div class="col-md-5 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/3209/3209265.png"
                 width="500" class="img-fluid">
        </div>

        <!-- Login Card -->
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0">

                <h3 class="fw-bold text-primary text-center">Welcome Back</h3>
                <p class="text-center text-secondary">Login to continue</p>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <label class="fw-semibold">Email</label>
                    <input type="email" class="form-control mb-3" name="email" required>

                    <label class="fw-semibold">Password</label>
                    <input type="password" class="form-control mb-3" name="password" required>

                    <label class="fw-semibold">Select Role</label>
                    <select class="form-select mb-3" name="role" required>
                        <option value="">Choose Role</option>
                        <option value="admin">Admin</option>
                        <option value="doctor">Doctor</option>
                        <option value="patient">Patient</option>
                    </select>

                    <button class="btn btn-primary w-100 rounded-pill py-2">
                        Login
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
