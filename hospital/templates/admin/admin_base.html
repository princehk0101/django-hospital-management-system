{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

    <div class="container-fluid py-4">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 mb-4">
                <div class="list-group shadow-sm">

                    <a href="{% url 'admin_dashboard' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-home me-2"></i> Dashboard
                    </a>

                    <a href="{% url 'admin_doctors' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-user-doctor me-2"></i> Doctors
                    </a>
                     
                    
                    <a href="{% url 'admin_patients' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-hospital-user me-2"></i> Patients
                    </a>

                    <a href="{% url 'admin_appointments' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-calendar-check me-2"></i> Appointments
                    </a>

                    <a href="{% url 'admin_search' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-search me-2"></i> Search
                    </a>

                </div>
            </div>

            <!-- MAIN CONTENT BLOCK -->
            <div class="col-md-9 col-lg-10">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>

</body>
</html>
