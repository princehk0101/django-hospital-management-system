{% extends 'admin/admin_base.html' %}
{% load static %}

{% block title %}Add Patient - Admin Panel{% endblock %}

{% block content %}

<div class="card shadow-sm border-0 p-4">

    <h3 class="fw-bold text-primary mb-4">
        <i class="fa fa-user-plus me-2"></i>Add New Patient
    </h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">

            <!-- NAME -->
            <div class="col-md-6">
                <label class="fw-semibold">Full Name</label>
                <input type="text" name="fname" class="form-control" placeholder="Enter full name" required>
            </div>

            <!-- EMAIL -->
            <div class="col-md-6">
                <label class="fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <!-- PHONE -->
            <div class="col-md-6">
                <label class="fw-semibold">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
            </div>

            <!-- AGE -->
            <div class="col-md-3">
                <label class="fw-semibold">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Age" required>
            </div>

            <!-- GENDER -->
            <div class="col-md-3">
                <label class="fw-semibold">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="" disabled selected>Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- ADDRESS -->
            <div class="col-12">
                <label class="fw-semibold">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Enter address" required></textarea>
            </div>

            <!-- DISEASE -->
            <div class="col-md-6">
                <label class="fw-semibold">Health Issue / Disease</label>
                <input type="text" name="disease" class="form-control" placeholder="E.g. Fever, Heart issue">
            </div>

            <!-- JOINING DATE -->
            <div class="col-md-6">
                <label class="fw-semibold">Joining Date</label>
                <input type="date" name="joining_date" class="form-control">
            </div>

            <!-- PROFILE PHOTO -->
            <div class="col-md-6">
                <label class="fw-semibold">Profile Photo</label>
                <input type="file" name="photo" class="form-control">
            </div>

        </div>

        <!-- SUBMIT BUTTON -->
        <button class="btn btn-primary rounded-pill px-4 mt-4">
            <i class="fa fa-check me-2"></i> Save Patient
        </button>

        <a href="{% url 'admin_patients' %}" class="btn btn-secondary rounded-pill px-4 mt-4 ms-2">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
