{% extends "doctor/doctor_base.html" %}
{% load static %}

{% block title %}Treatment Form - Doctor Panel{% endblock %}

{% block page_heading %}
<i class="fa fa-notes-medical me-2"></i>Treatment Form
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0 mb-4">
    <div class="card-header bg-white">
        <h5 class="fw-bold mb-0">Record Patient Treatment</h5>
    </div>

    <div class="card-body">

        <form class="row g-4">

           <select class="form-select" name="patient" required>
    <option disabled selected>Choose patient...</option>

    {% for p in patients %}
        <option value="{{ p.id }}">
            {{ p.user.get_full_name }} (Age: {{ p.age }})
        </option>
    {% endfor %}

</select>


            <!-- VISIT DATE -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Visit Date</label>
                <input type="date" class="form-control" />
            </div>

            <!-- DIAGNOSIS -->
            <div class="col-12">
                <label class="form-label fw-semibold">Diagnosis</label>
                <textarea class="form-control" rows="2" placeholder="Enter diagnosis details..."></textarea>
            </div>

            <!-- PRESCRIPTION -->
            <div class="col-12">
                <label class="form-label fw-semibold">Prescription</label>
                <textarea class="form-control" rows="2" placeholder="Enter prescribed medicines..."></textarea>
            </div>

            <!-- DOCTOR NOTES -->
            <div class="col-12">
                <label class="form-label fw-semibold">Doctor Notes</label>
                <textarea class="form-control" rows="3" placeholder="Additional notes, follow-up advice..."></textarea>
            </div>

            <!-- SUBMIT BUTTON -->
            <div class="col-12">
                <button class="btn btn-primary w-100 rounded-pill py-2">
                    <i class="fa fa-save me-1"></i> Save Treatment Record
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
