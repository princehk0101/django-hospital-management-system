{% extends "patient/patient_base.html" %}
{% load static %}

{% block title %}Book Appointment{% endblock %}

{% block page_heading %}
<i class="fa fa-calendar-check me-2"></i> Book an Appointment
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0 p-4">

    <h3 class="fw-bold text-primary mb-4">
        <i class="fa fa-calendar-check me-2"></i> Book an Appointment
    </h3>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">

            <!-- DEPARTMENT -->
            <div class="col-md-6">
                <label class="fw-semibold">Select Department</label>
                <select name="department" id="departmentSelect" class="form-select" required>
                    <option value="" disabled selected>Select Department</option>

                    {% for dept in departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- DOCTOR -->
            <div class="col-md-6">
                <label class="fw-semibold">Select Doctor</label>
                <select name="doctor" id="doctorSelect" class="form-select" required>
                    <option value="" disabled selected>Select Doctor</option>

                    {% for d in doctors %}
                        <option value="{{ d.id }}" data-dept="{{ d.department }}"
                            {% if d.id|stringformat:"s" == preselected_id %}selected{% endif %}>
                            Dr. {{ d.user.get_full_name }} ({{ d.department }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- DATE -->
            <div class="col-md-6">
                <label class="fw-semibold">Appointment Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <!-- TIME -->
            <div class="col-md-6">
                <label class="fw-semibold">Appointment Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>

            <!-- SYMPTOMS -->
            <div class="col-12">
                <label class="fw-semibold">Problem / Symptoms</label>
                <textarea name="symptoms" rows="3" class="form-control"
                          placeholder="Describe your health issue..." required></textarea>
            </div>
        </div>

        <button class="btn btn-primary rounded-pill px-4 mt-3">
            Book Appointment
        </button>

    </form>

</div>

<!-- FILTER DOCTORS BY DEPARTMENT -->
<script>
document.getElementById("departmentSelect").addEventListener("change", function () {
    let selectedDept = this.value;
    let doctors = document.querySelectorAll("#doctorSelect option");

    doctors.forEach(opt => {
        if (opt.value === "") return; // ignore placeholder option
        opt.style.display = (opt.dataset.dept === selectedDept) ? "block" : "none";
    });

    // Automatically select first matching doctor
    document.getElementById("doctorSelect").value = "";
});
</script>

{% endblock %}
