{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Patient Panel{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

    <!-- TOP NAVBAR -->
    <nav class="navbar navbar-light bg-white shadow-sm py-3">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold text-primary fs-4">
                {% block page_heading %}
                <i class="fa fa-user me-2"></i>Patient Panel
                {% endblock %}
            </a>

            <div class="ms-auto d-flex gap-2">
                <a href="{% url 'patient_dashboard' %}"
                   class="btn btn-outline-primary btn-sm rounded-pill">Dashboard</a>

                <a href="{% url 'login' %}" class="btn btn-danger btn-sm rounded-pill">
                    <i class="fa fa-power-off"></i> Logout
                </a>
            </div>

        </div>
    </nav>

    <!-- BODY -->
    <div class="container-fluid mt-4">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 mb-4">
                <div class="list-group shadow-sm">

                    <a href="{% url 'patient_dashboard' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-home me-2"></i> Dashboard
                    </a>

                    <a href="{% url 'patient_appointments' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-calendar-alt me-2"></i> My Appointments
                    </a>

                    <a href="{% url 'patient_book_appointment' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-calendar-plus me-2"></i> Book Appointment
                    </a>

                    <a href="{% url 'patient_doctors_list' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-user-doctor me-2"></i> Doctors List
                    </a>

                    <a href="{% url 'patient_history' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-file-medical me-2"></i> Treatment History
                    </a>

                    <a href="{% url 'patient_profile' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-user-circle me-2"></i> Profile
                    </a>

                    <a href="{% url 'patient_profile_edit' %}" class="list-group-item list-group-item-action">
                        <i class="fa fa-edit me-2"></i> Edit Profile
                    </a>

                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>

</body>
</html>
